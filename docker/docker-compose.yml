version: '3.8'

x-vpn-base: &vpn-base
  image: multi-vpn-proxy:latest
  restart: unless-stopped
  volumes:
    - ../ovpn:/vpn/ovpn:ro
  cap_add:
    - NET_ADMIN
    - NET_RAW
  devices:
    - /dev/net/tun
  sysctls:
    net.ipv4.conf.all.rp_filter: 0
  dns:
    - 1.1.1.1
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  vpn-usa:
    <<: *vpn-base
    container_name: vpn-usa
    environment:
      VPN_NAME: usa
      OVPN_FILE: us-free-67.protonvpn.udp.ovpn
      CREDS_FILE: credentials.txt
      PROXY_PORT: 1080
    ports:
      - "127.0.0.1:1080:1080"

  vpn-netherlands:
    <<: *vpn-base
    container_name: vpn-netherlands
    environment:
      VPN_NAME: netherlands
      OVPN_FILE: nl-free-244.protonvpn.udp.ovpn
      CREDS_FILE: credentials.txt
