# SDD Config - Multi-Proxy VPN Project

schema: spec-driven

context: |
  Tech stack: Bash scripts, OpenVPN, Proxy chains
  Architecture: Modular shell scripts with monitoring/debugging/deployment
  Testing: Shell-based unit tests
  Security: VPN credentials management, security monitoring

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/scripts
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Document CLI interface design
    - Include error handling patterns
  tasks:
    - Group tasks by phase (core, monitoring, testing, deployment)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing bash conventions (set -euo pipefail)
    - Include proper error messages and logging
  verify:
    - Run shellcheck if available
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
